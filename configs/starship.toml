"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
command_timeout = 500
scan_timeout = 30

format = """
[Óā∂](166)\
$username\
[Óāį](fg:166 bg:179)\
$directory\
[Óāį](fg:179 bg:107)\
$git_branch\
$git_status\
([Óāį](fg:107 bg:66)$nodejs$python$rust$golang$php$java)\
[Óāį](fg:prev_bg bg:236)\
$time\
[Óāī](236)\
$line_break\
$character"""

[username]
show_always = true
style_user = "bg:166 fg:255 bold"
style_root = "bg:166 fg:255 bold"
format = "[ $user ]($style)"

[directory]
style = "bg:179 fg:255 bold"
home_symbol = "~"
truncation_length = 2
truncation_symbol = "‚Ä¶/"
format = "[ $path ]($style)"

[git_branch]
symbol = "Ôźė"
style = "bg:107 fg:255 bold"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:107 fg:255 bold"
format = "[( $deleted$modified$staged$untracked )]($style)"
deleted = "x"
modified = "!"
staged = "+"
untracked = "?"
ahead = ""
behind = ""
diverged = ""
renamed = ""
stashed = ""
conflicted = ""

[nodejs]
symbol = "‚¨Ę"
style = "bg:66 fg:255 bold"
format = "[ $symbol $version ]($style)"
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = "ÓėÜ"
style = "bg:66 fg:255 bold"
format = "[ $symbol $version ]($style)"

[rust]
symbol = "Óě®"
style = "bg:66 fg:255 bold"
format = "[ $symbol $version ]($style)"

[golang]
symbol = "Óėß"
style = "bg:66 fg:255 bold"
format = "[ $symbol $version ]($style)"

[php]
symbol = "Óėą"
style = "bg:66 fg:255 bold"
format = "[ $symbol $version ]($style)"

[java]
symbol = "ÓČĖ"
style = "bg:66 fg:255 bold"
format = "[ $symbol $version ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:236 fg:255 bold"
format = "[ ÔÄó $time ]($style)"

[line_break]
disabled = false

[character]
success_symbol = "[‚ěú](bold 179)"
error_symbol = "[‚ěú](bold 167)"
vimcmd_symbol = "[‚ěú](bold 66)"
